# ==========================================
# CGI-242 — Deploiement automatique via GitHub Actions
# ==========================================
# Frontend build dans GitHub Actions (7 GB RAM)
# Backend build sur le VPS (Docker)
# ==========================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: 51.83.75.203
  VPS_USER: ubuntu
  APP_DIR: /opt/cgi242

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies & build frontend
        run: |
          cd mobile
          npm install --legacy-peer-deps
          EXPO_PUBLIC_API_URL=/api npx expo export --platform web
          cd ..

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload frontend build
        run: |
          rsync -az --delete mobile/dist/ ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.APP_DIR }}/nginx/dist/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}

            # Pull latest code
            git pull origin main

            # --- Generer server/.env.production depuis GitHub Secrets ---
            cat > server/.env.production << 'ENVEOF'
            NODE_ENV=production
            PORT=3003
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_EXPIRES_IN=15m
            JWT_REFRESH_EXPIRES_IN=7d
            MFA_ENCRYPTION_KEY=${{ secrets.MFA_ENCRYPTION_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}
            FRONTEND_URL=https://tax.normx-ai.com
            CORS_ORIGIN=https://tax.normx-ai.com,https://normx-ai.com
            QDRANT_URL=http://qdrant:6333
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=465
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=no-reply@normx-ai.com
            TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}
            MOBILE_API_SECRET=${{ secrets.MOBILE_API_SECRET }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ENVEOF
            chmod 600 server/.env.production

            # --- Generer .env (Docker Compose) ---
            cat > .env << 'ENVEOF'
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ENVEOF
            chmod 600 .env

            # --- Rebuild et restart ---
            docker compose build --no-cache api nginx
            docker compose up -d

            # --- Verifier la sante ---
            sleep 10
            curl -sf http://localhost:3003/health || echo "WARN: Health check failed"

            echo "Deploiement termine avec succes"
