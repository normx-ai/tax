name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VPS_HOST: 51.83.75.203
  VPS_USER: ubuntu
  APP_DIR: /opt/tax

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies & build frontend
        run: |
          cd mobile
          npm install --legacy-peer-deps
          EXPO_PUBLIC_API_URL=/api npx expo export --platform web
          cp assets/favicon.png dist/favicon.ico
          cp assets/favicon.png dist/favicon.png
          cd ..

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload frontend build
        run: |
          rsync -az --delete mobile/dist/ ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.APP_DIR }}/mobile/dist/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.APP_DIR }}

            git checkout -- .
            git pull origin main

            # server/.env.production depuis GitHub Secrets
            printf '%s\n' \
              "NODE_ENV=production" \
              "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" \
              "JWT_EXPIRES_IN=15m" \
              "JWT_REFRESH_EXPIRES_IN=7d" \
              "MFA_ENCRYPTION_KEY=${{ secrets.MFA_ENCRYPTION_KEY }}" \
              "KEYCLOAK_URL=https://auth.normx-ai.com" \
              "KEYCLOAK_REALM=normx" \
              "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
              "VOYAGE_API_KEY=${{ secrets.VOYAGE_API_KEY }}" \
              "FRONTEND_URL=https://tax.normx-ai.com" \
              "BASE_URL=https://tax.normx-ai.com" \
              "CORS_ORIGIN=https://tax.normx-ai.com,https://normx-ai.com" \
              "SMTP_HOST=${{ secrets.SMTP_HOST }}" \
              "SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}" \
              "SMTP_USER=${{ secrets.SMTP_USER }}" \
              "SMTP_PASS=${{ secrets.SMTP_PASS }}" \
              "SMTP_FROM=no-reply@normx-ai.com" \
              "TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}" \
              "MOBILE_API_SECRET=${{ secrets.MOBILE_API_SECRET }}" \
              "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" \
              > server/.env.production
            chmod 600 server/.env.production

            # Rebuild tax-api via le compose infra (DATABASE_URL/QDRANT_URL
            # sont definis directement dans /opt/infra/docker-compose.yml)
            cd /opt/infra
            sudo docker compose up -d --build tax-api

            # Attendre que le container soit healthy (evite le curl premature)
            for i in $(seq 1 30); do
              if [ "$(sudo docker inspect -f '{{.State.Health.Status}}' normx-tax-api 2>/dev/null)" = "healthy" ]; then
                break
              fi
              sleep 2
            done

            # Forcer nginx a re-resoudre l'upstream (nouvelle IP apres recreate
            # du container tax-api, sinon cache de l'ancienne IP -> 502)
            sudo docker exec normx-nginx nginx -s reload

            # Healthcheck public (via nginx + Cloudflare)
            curl -sf https://tax.normx-ai.com/health || exit 1

            echo "Deploiement tax termine avec succes"
