server {
    listen 80;
    server_name tax.normx-ai.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name tax.normx-ai.com;

    ssl_certificate /etc/letsencrypt/live/tax.normx-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tax.normx-ai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    include /etc/nginx/conf.d/security-headers.conf;

    # Landing HTML statique — prioritaire sur /
    location = / {
        root /var/www/cgi242-landing;
        index index.html;
        add_header Cache-Control "no-cache" always;
    }
    location = /index.html {
        root /var/www/cgi242-landing;
        add_header Cache-Control "no-cache" always;
    }
    location ^~ /img/ {
        root /var/www/cgi242-landing;
        expires 7d;
    }
    location = /favicon.ico {
        root /var/www/cgi242-landing;
        add_header Cache-Control "no-cache" always;
    }
    location = /favicon.png {
        root /var/www/cgi242-landing;
        add_header Cache-Control "no-cache" always;
    }

    # API
    location /api {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /api/auth/clear-session {
        limit_req zone=session_cleanup burst=3 nodelay;
        proxy_pass http://api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health { proxy_pass http://api:3003; }

    # App Expo (toutes les autres routes)
    location / {
        root /var/www/cgi242;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location /_expo/static/ {
        root /var/www/cgi242;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }
}
