# Redirection HTTP -> HTTPS
server {
    listen 80;
    server_name tax.normx-ai.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name tax.normx-ai.com;

    ssl_certificate /etc/letsencrypt/live/tax.normx-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tax.normx-ai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security headers (niveau server — appliques aux locations SANS add_header)
    include /etc/nginx/conf.d/security-headers.conf;

    root /var/www/cgi242;
    index index.html;

    # Rate limit strict pour clear-session (H5 — endpoint sans auth)
    location = /api/auth/clear-session {
        limit_req zone=session_cleanup burst=3 nodelay;

        proxy_pass http://api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API vers le backend
    location /api {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts proxy (120s pour les appels Claude AI)
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Swagger / docs API (restreint en production)
    location /docs {
        allow 51.83.75.203;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check backend
    location /health {
        proxy_pass http://api:3003;
    }

    # index.html — jamais mis en cache (pour charger les nouveaux bundles JS)
    location = /index.html {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Frontend statique (SPA)
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Assets avec hash dans le nom (immutable) — cache long
    location /_expo/static/ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Favicon — pas de cache (éviter ancien favicon bloqué)
    location = /favicon.ico {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        expires 0;
    }

    # Autres assets statiques — cache court
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public" always;
    }
}
