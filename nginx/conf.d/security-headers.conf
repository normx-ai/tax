# ==========================================
# CGI-242 — Headers de securite partages
# ==========================================
# Inclure dans chaque bloc location qui utilise add_header,
# car Nginx ecrase les add_header du bloc server dans les locations.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy strict-origin-when-cross-origin always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://*.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://tax.normx-ai.com; connect-src 'self' https://tax.normx-ai.com https://auth.normx-ai.com https://*.sentry.io; frame-src https://challenges.cloudflare.com https://*.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com" always;
