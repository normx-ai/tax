# NORMX AI — normx-ai.com (landing page statique)

# Redirection HTTP -> HTTPS
server {
    listen 80;
    server_name normx-ai.com www.normx-ai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name normx-ai.com www.normx-ai.com;

    ssl_certificate /etc/letsencrypt/live/normx-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/normx-ai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:NormxSSL:5m;
    ssl_session_tickets off;

    include /etc/nginx/conf.d/security-headers.conf;

    root /var/www/normx-ai;
    index index.html;

    # Landing page statique
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Assets statiques
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|css|js)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public" always;
    }
}
