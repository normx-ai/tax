# NORMX AI — normx-ai.com (app Expo — landing tous produits)

# Redirection HTTP -> HTTPS
server {
    listen 80;
    server_name normx-ai.com www.normx-ai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name normx-ai.com www.normx-ai.com;

    ssl_certificate /etc/letsencrypt/live/normx-ai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/normx-ai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:NormxSSL:5m;
    ssl_session_tickets off;

    include /etc/nginx/conf.d/security-headers.conf;

    root /var/www/cgi242;
    index index.html;

    # Rate limit strict pour clear-session
    location = /api/auth/clear-session {
        limit_req zone=session_cleanup burst=3 nodelay;

        proxy_pass http://api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API vers le backend
    location /api {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Swagger / docs API
    location /docs {
        proxy_pass http://api:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check backend
    location /health {
        proxy_pass http://api:3003;
    }

    # index.html — jamais mis en cache
    location = /index.html {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Frontend statique (SPA)
    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache" always;
    }

    # Assets avec hash — cache long
    location /_expo/static/ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Favicon — pas de cache
    location = /favicon.ico {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, must-revalidate" always;
        expires 0;
    }

    # Autres assets statiques
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public" always;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/x-javascript application/xml image/svg+xml;
}
