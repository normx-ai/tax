# ==========================================
# CGI-242 — Docker Compose Production
# ==========================================

services:
  # --- Backend API ---
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cgi242-api
    restart: unless-stopped
    env_file: ./server/.env.production
    environment:
      - PORT=3003
      - DATABASE_URL=postgresql://cgi242:${POSTGRES_PASSWORD}@postgres:5432/cgi242?schema=public
      - QDRANT_URL=http://qdrant:6333
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - cgi242-net
    # Filesystem read-only sauf /tmp (B5)
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: cgi242-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cgi242
      POSTGRES_USER: cgi242
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cgi242"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cgi242-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Qdrant (base vectorielle) ---
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: cgi242-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - cgi242-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --- Nginx (reverse proxy + frontend statique) ---
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: cgi242-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /var/www/normx-app:/var/www/normx-app:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - cgi242-net
      - normx-legal-net
      - normx-net
      - keycloak-net
    # Healthcheck Nginx (B8)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  qdrant_data:

networks:
  cgi242-net:
    driver: bridge
  normx-legal-net:
    external: true
    name: normx-legal_normx-legal-net
  normx-net:
    external: true
    name: normx_normx-net
  keycloak-net:
    external: true
    name: keycloak_keycloak-net
